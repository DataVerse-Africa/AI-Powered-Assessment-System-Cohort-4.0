name: Build and Deploy Patient Assessment API to EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/patient-assessment-api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/patient-assessment-api:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/patient-assessment-api:latest
        cache-to: type=inline

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          # Pull the latest image
          docker pull dataverseafrica/patient-assessment-api:latest
          
          # Stop and remove old container
          docker stop patient-assessment || true
          docker rm patient-assessment || true
          
          # Run new container with restart policy
          docker run -d \
            -p 8000:8000 \
            --env-file /home/${{ secrets.EC2_USER }}/.env \
            --name patient-assessment \
            --restart unless-stopped \
            dataverseafrica/patient-assessment-api:latest
          
          # Show container status
          docker ps
          
          # Show logs (last 50 lines)
          docker logs --tail 50 patient-assessment